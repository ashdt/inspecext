<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 360px; margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { padding: 14px; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .sub { color: #64748b; font-size: 12px; margin-bottom: 12px; }
    button { border: 0; border-radius: 10px; padding: 9px 10px; font-weight: 700; cursor: pointer; background: #2563eb; color: white; width: 100%; margin: 5px 0; }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.danger { background: #fee2e2; color: #991b1b; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px; margin-top: 10px; box-shadow: 0 8px 22px rgba(15,23,42,.06); }
    .row { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; }
    .row:last-child { border-bottom: 0; }
    .status { font-size: 12px; color: #334155; min-height: 18px; margin-top: 7px; }
    label { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 8px; }
    input[type="checkbox"] { width: 15px; height: 15px; }
    #previewOut { max-height: 160px; overflow: auto; font-size: 11px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>inspecext</h1>
    <div class="sub" id="site">Active tab only · local export</div>
    <button id="scan">Scan / Add export buttons</button>
    <button id="preview" class="secondary">Preview detected data</button>
    <button id="exportAll" class="secondary">Export all detected tables</button>
    <button id="remove" class="danger">Remove buttons</button>
    <div class="card">
      <div class="row"><span>Detected tables</span><b id="count">—</b></div>
      <div class="row"><span>Native tables</span><b id="native">—</b></div>
      <div class="row"><span>ARIA grids</span><b id="aria">—</b></div>
      <div class="row"><span>Div/repeated lists</span><b id="divs">—</b></div>
    </div>
    <div class="card">
      <label><input id="includeLinks" type="checkbox" checked /> Include link URLs</label>
      <label><input id="observe" type="checkbox" checked /> Watch page changes</label>
    </div>
    <div class="card"><div id="previewOut">Run preview to inspect sample rows.</div></div>
    <div class="status" id="status"></div>
  </div>
  <script src="./popup.js"></script>
</body>
</html>
