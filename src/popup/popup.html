<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 380px; margin: 0; font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { padding: 14px; }
    button { border: 0; border-radius: 10px; padding: 9px 10px; font-weight: 700; cursor: pointer; background: #2563eb; color: white; width: 100%; margin: 5px 0; }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.danger { background: #fee2e2; color: #991b1b; }
    .row{display:flex;justify-content:space-between;font-size:12px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-top:8px}
    #previewOut{max-height:150px;overflow:auto;font-size:11px;white-space:pre-wrap}
    #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none}
    #modal.open{display:block}
    #modal .sheet{background:#fff; width:min(900px,95vw); height:min(85vh,700px); margin:5vh auto; border-radius:12px; padding:12px; overflow:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <h3>inspecext</h3>
    <div id="site" style="font-size:12px;color:#64748b">Active tab</div>
    <div class="card">
      <label style="font-size:12px"><input id="includeLinks" type="checkbox" checked /> Include links</label>
      <label style="font-size:12px"><input id="observe" type="checkbox" checked /> Observe updates</label>
    </div>
    <button id="scan">Scan / Add export buttons</button>
    <button id="preview" class="secondary">Preview detected data</button>
    <button id="openTab" class="secondary">Open preview in new tab</button>
    <button id="excel" class="secondary">Export preview to Excel (.xls)</button>
    <button id="exportAll" class="secondary">Export all detected tables</button>
    <button id="remove" class="danger">Remove buttons</button>
    <div class="card">
      <div class="row"><span>Detected</span><b id="count">—</b></div>
      <div class="row"><span>Native</span><b id="native">—</b></div>
      <div class="row"><span>ARIA</span><b id="aria">—</b></div>
      <div class="row"><span>Div/list</span><b id="divs">—</b></div>
    </div>
    <div class="card"><div id="previewOut">Run preview to inspect sample rows.</div></div>
    <div id="status" style="font-size:12px;margin-top:8px"></div>
  </div>

  <div id="modal">
    <div class="sheet">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="search" placeholder="Search preview" style="flex:1;padding:8px" />
        <button id="close" style="width:auto">Close</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
